apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: project1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
      - name: hello-app
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8080

        # ✅ REQUIRED for HPA
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "256Mi"

        # ✅ PRODUCTION READINESS
        readinessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 5

        # ✅ SELF-HEALING
        livenessProbe:
          httpGet:
            path: /
            port: 8080
          initialDelaySeconds: 20
          periodSeconds: 10
