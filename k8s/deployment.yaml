apiVersion: apps/v1
kind: Deployment
metadata:
  name: hello-app
  namespace: project1
spec:
  replicas: 2
  selector:
    matchLabels:
      app: hello-app
  template:
    metadata:
      labels:
        app: hello-app
    spec:
      containers:
      - name: hello-app   # ✅ FIXED (was "app")
        image: IMAGE_PLACEHOLDER
        ports:
        - containerPort: 8080
