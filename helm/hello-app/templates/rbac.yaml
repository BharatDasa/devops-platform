apiVersion: v1
kind: ServiceAccount
metadata:
  name: hello-app-sa
  namespace: project1

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hello-app-role
  namespace: project1
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hello-app-binding
  namespace: project1
subjects:
- kind: ServiceAccount
  name: hello-app-sa
roleRef:
  kind: Role
  name: hello-app-role
  apiGroup: rbac.authorization.k8s.io
