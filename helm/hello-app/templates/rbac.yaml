apiVersion: v1
kind: ServiceAccount
metadata:
  name: hello-app-sa
  namespace: {{ .Release.Namespace }}

---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hello-app-role
  namespace: {{ .Release.Namespace }}
rules: []

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hello-app-binding
  namespace: {{ .Release.Namespace }}
subjects:
- kind: ServiceAccount
  name: hello-app-sa
roleRef:
  kind: Role
  name: hello-app-role
  apiGroup: rbac.authorization.k8s.io
